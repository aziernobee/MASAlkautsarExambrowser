name: Build APK Al Kautsar Exam Browser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Bisa di-trigger manual

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      # Step 3: Setup Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 4: Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Step 5: Accept Android licenses
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # Step 6: Install dependencies
      - name: Install npm dependencies
        run: |
          npm install
          npm install react-native-webview react-native-device-info react-native-background-timer @react-native-community/netinfo

      # Step 7: Make gradlew executable
      - name: Setup Gradle
        run: |
          cd android
          chmod +x gradlew

      # Step 8: Build APK Debug (cepat, untuk testing)
      - name: Build APK Debug
        run: |
          cd android
          ./gradlew assembleDebug

      # Step 9: Build APK Release (untuk production)
      - name: Build APK Release
        run: |
          cd android
          ./gradlew assembleRelease

      # Step 10: Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AlKautsarExamBrowser-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Step 11: Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AlKautsarExamBrowser-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk

      # Step 12: Create Release (opsional - untuk rilis resmi)
      - name: Create Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v1
        with:
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
            android/app/build/outputs/apk/release/app-release-unsigned.apk
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## Al Kautsar Exam Browser v${{ github.run_number }}
            
            ### Fitur Keamanan:
            - ✅ Fullscreen lock
            - ✅ Anti screenshot (FLAG_SECURE)
            - ✅ Anti copy-paste
            - ✅ Anti devtools
            - ✅ Block tombol back
            - ✅ URL whitelist
            - ✅ Lock screen merah
            - ✅ Password pengawas: 081511
            
            ### Cara Install:
            1. Download APK
            2. Enable "Install unknown apps" di Settings
            3. Install APK
            4. Aktifkan Device Admin saat pertama buka
            
            **Catatan**: Untuk keamanan maksimal, gunakan iPad dengan SEB asli.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
