name: Build APK Al Kautsar Exam Browser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Bisa di-trigger manual

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout code (UPGRADE ke v6 untuk Node 24)
      - name: Checkout repository
        uses: actions/checkout@v6

      # Step 2: Setup Node.js (UPGRADE ke v6, matikan cache)
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'  # Node 22 = LTS, stabil
          # cache: 'npm'      # DIHAPUS - biar tidak error lockfile

      # Step 3: Setup Java 17
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Step 4: Setup Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # Step 5: Accept Android licenses
      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      # Step 6: Install dependencies (pakai npm install, BUKAN npm ci)
      - name: Install npm dependencies
        run: |
          npm install
          npm install react-native-webview react-native-device-info react-native-background-timer @react-native-community/netinfo

      # Step 7: Make gradlew executable
      - name: Setup Gradle
        run: |
          cd android
          chmod +x gradlew

      # Step 8: Build APK Debug (cepat, untuk testing)
      - name: Build APK Debug
        run: |
          cd android
          ./gradlew assembleDebug

      # Step 9: Build APK Release (untuk production)
      - name: Build APK Release
        run: |
          cd android
          ./gradlew assembleRelease

      # Step 10: Upload Debug APK
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AlKautsarExamBrowser-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      # Step 11: Upload Release APK
      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AlKautsarExamBrowser-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
