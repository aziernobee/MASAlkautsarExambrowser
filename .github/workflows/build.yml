name: Build APK Al Kautsar Exam Browser

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install dependencies
        run: |
          npm install
          npm install react-native-webview react-native-device-info react-native-background-timer @react-native-community/netinfo

      - name: Setup Gradle
        run: |
          cd android
          chmod +x gradlew

      - name: Build APK Debug
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Build APK Release
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: AlKautsarExamBrowser-Debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: AlKautsarExamBrowser-Release
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
